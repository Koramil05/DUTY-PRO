<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Duty Schedule Pro · Jaga Pos</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#121212">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- ICON -->
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#121212;
color:#fff;
font-family:Segoe UI;
margin:0;
padding:15px;
max-width:600px;
margin:auto;
}

h1{
text-align:center;
font-weight:500;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
background:#1e1e1e;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.day.today{
background:#004d00;
}

.button-group{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:40px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn-share{background:#1f9e5a;}
.btn-png{background:#3b5f7a;}
.btn-reset{background:#7a3b3b;}

.modal{
display:none;
position:fixed;
inset:0;
background:#0008;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1e1e1e;
padding:20px;
border-radius:20px;
width:300px;
}

#print-area{
position:absolute;
left:-9999px;
background:white;
color:black;
padding:30px;
}

</style>
</head>

<body>

<h1><i class="fa-solid fa-helmet-safety"></i> DUTY PRO</h1>

<div id="clock" style="text-align:center;font-size:22px"></div>

<div class="calendar" id="calendar"></div>

<div class="button-group">

<button class="btn btn-share" onclick="shareToday()">
<i class="fab fa-whatsapp"></i> Share
</button>

<button class="btn btn-png" onclick="saveAsImage()">
<i class="fas fa-image"></i> PNG
</button>

<button class="btn btn-reset" onclick="resetJadwal()">
<i class="fas fa-trash"></i> Reset
</button>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3 id="modal-date"></h3>

<div id="checkbox-list"></div>

<button onclick="closeModal()">Tutup</button>

</div>
</div>

<div id="print-area">
<h2>DUTY SCHEDULE</h2>
<table id="print-table"></table>
</div>

<audio id="tingtong">
<source src="https://notificationsounds.com/storage/sounds/file-sounds-1157-ting-tong.mp3">
</audio>

<script>

/* ================= JAM ================= */

function clock(){
const d=new Date()

document.getElementById("clock").innerText=
d.toLocaleTimeString()

}

setInterval(clock,1000)
clock()


/* ================= DATA ================= */

const petugas=[
"Ajik Su",
"Wayan S",
"Mang Beni",
"Indra S",
"Kadek Widana"
]

let jadwal=JSON.parse(localStorage.getItem("jadwalJaga")||"{}")

const today=new Date()

function pad(n){
return n.toString().padStart(2,"0")
}

function formatDate(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}


/* ================= KALENDER ================= */

function renderCalendar(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

const y=today.getFullYear()
const m=today.getMonth()

const days=new Date(y,m+1,0).getDate()

for(let d=1;d<=days;d++){

const el=document.createElement("div")

const dateStr=y+"-"+pad(m+1)+"-"+pad(d)

el.className="day"

if(dateStr===formatDate(today))
el.classList.add("today")

el.innerHTML="<strong>"+d+"</strong>"

el.onclick=()=>openModal(dateStr)

cal.appendChild(el)

}

}

renderCalendar()


/* ================= MODAL ================= */

function openModal(date){

document.getElementById("modal").style.display="flex"

document.getElementById("modal-date").innerText=date

const list=document.getElementById("checkbox-list")

list.innerHTML=""

petugas.forEach(n=>{

const label=document.createElement("label")

const cb=document.createElement("input")

cb.type="checkbox"

label.appendChild(cb)

label.append(" "+n)

list.appendChild(label)

})

}

function closeModal(){

document.getElementById("modal").style.display="none"

}


/* ================= SHARE ================= */

function shareToday(){

const ting=document.getElementById("tingtong")

ting.play()

let text="Jadwal Jaga Hari Ini"

const url="https://wa.me/?text="+encodeURIComponent(text)

window.open(url)

}


/* ================= PNG ================= */

function saveAsImage(){

html2canvas(document.body).then(canvas=>{

const a=document.createElement("a")

a.href=canvas.toDataURL()

a.download="jadwal.png"

a.click()

})

}


/* ================= RESET ================= */

function resetJadwal(){

if(confirm("Reset semua jadwal?")){

localStorage.removeItem("jadwalJaga")

location.reload()

}

}


/* ================= SERVICE WORKER ================= */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
